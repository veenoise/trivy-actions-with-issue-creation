name: Scan Table Output

on:
  push:
    branches:
      - main
      - develop

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write # Required to create an issue
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        id: trivy_scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true # Prevents the job from stopping here
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          scanners: "vuln"
          severity: "HIGH,CRITICAL"

      - name: Create Issue if Vulnerabilities Found
        if: steps.trivy_scan.outcome == 'failure'
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          filename: .github/ISSUE_TEMPLATE/vuln_report.md
          
      - name: Final Status Check
        if: steps.trivy_scan.outcome == 'failure'
        run: |
          echo "Vulnerabilities were found. Failing build."
          exit 1